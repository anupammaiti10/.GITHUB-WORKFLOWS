name: Passing Varibales

on:
    workflow_dispatch:

jobs:
    producer:
        runs-on: ubuntu-24.04
        outputs:
            foo: ${{steps.generate-var.outputs.foo}}
        steps:
            - name: Generate Variable
              id: generate-var
              run: |
                foo=bar
                # Step 1: Set the variable as an output

                echo "foo=${foo}">>"$GITHUB_OUTPUT"  
                # Step 2: Print the variable to the console
                echo "Generated variable: ${foo}"
                # Step 3: Set the variable as an environment variable for subsequent steps
                echo "FOO=${foo}" >> $GITHUB_ENV 
            