name: Persisting Data Between Jobs

on: 
    workflow_dispatch:


jobs:
    artifacts-producer:
        runs-on: Windows-2022
        steps:
            - name: Create a artifacts file
              run: |
                  echo "This is the artifacts file to store the data between the jobs" > artifacts.txt
                  echo "This data are stored on ${date}" >> artifacts.txt


            - name: Upload the artifacts file
              uses: actions/upload-artifact@v3
              with:
                  name: artifacts-file-Upload
                  path: artifacts.txt

    artifacts-consumer:
        runs-on: Windows-2022
        needs: artifacts-producer
        steps:
            - name: Download the artifacts file
              uses: actions/download-artifact@v3
              with:
                  name: artifacts-file-Upload

            - name: Cat the content inside the artifacts file
              run: |
                  cat artifacts.txt